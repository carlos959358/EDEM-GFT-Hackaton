name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: edem-hackathon-2026
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/edem-hackathon-2026/gft-hackaton

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "$REGION"-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/backend:$IMAGE_TAG" -t "$REGISTRY/backend:latest" ./backend
          docker push "$REGISTRY/backend:$IMAGE_TAG"
          docker push "$REGISTRY/backend:latest"

      - name: Deploy backend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          gcloud run deploy gft-hackaton-backend \
            --image "$REGISTRY/backend:$IMAGE_TAG" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "$REGION"-docker.pkg.dev --quiet

      - name: Build and push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/frontend:$IMAGE_TAG" -t "$REGISTRY/frontend:latest" ./frontend
          docker push "$REGISTRY/frontend:$IMAGE_TAG"
          docker push "$REGISTRY/frontend:latest"

      - name: Deploy frontend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          gcloud run deploy gft-hackaton-frontend \
            --image "$REGISTRY/frontend:$IMAGE_TAG" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated
